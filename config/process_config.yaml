# =============================================================================
# process_config.yaml  --  THE SINGLE SOURCE OF TRUTH
# =============================================================================
# ACTIVE DATASET: REAL froth-flotation plant data (Kaggle "Quality Prediction
# in a Mining Process", edumagalhaes). A real Brazilian iron-ore flotation
# plant: 737,453 rows of 20-second sensor readings, hourly lab quality values.
#
# This demonstrates the config-as-contract design: swapping from the synthetic
# furnace dataset to this real plant required editing ONLY this file (and
# dropping in the CSV). The synthetic contract is preserved in
# process_config.synthetic.yaml -- point `dataset.path`/`columns` back to it to
# switch datasets.
#
# ROLES:
#   controllable -> a setpoint an operator can dial (the optimizer searches these)
#   fixed        -> a measured operating condition that cannot be set
#                   (incoming ore grade, upstream pulp flow/density)
#   target       -> the quality KPI we predict and optimize
# =============================================================================

dataset:
  name: mining_flotation
  path: data/MiningProcess_Flotation_Plant_Database.csv
  # source: real  -> the pipeline uses the CSV as-is (no synthetic generation).
  # source: synthetic -> generate_data.py fabricates the CSV first.
  source: real
  random_seed: 42
  # pandas.read_csv overrides for this file. Real factory exports vary in
  # decimal marker / delimiter / encoding; declare them here, not in code.
  csv_read_kwargs:
    decimal: ","

preprocess:
  test_size: 0.2
  impute_strategy: median
  # This plant logs sensors every 20s but the lab quality value is hourly, so
  # ~180 consecutive rows share ONE target. Averaging each hour to a single row
  # (aggregate_by: date) yields genuinely independent samples: it removes the
  # repeated-label leakage that otherwise inflates R², and denoises the sensors.
  aggregate_by: date
  # After aggregation each row is an independent hour, so a shuffled split is
  # leak-free. (A 'time' split is also available -- it's stricter and exposes
  # process non-stationarity; on this plant it drops R2 to ~0.06, i.e. future
  # periods are genuinely hard to predict.)
  split: random
  time_column: date
  # Real sensor dropouts show up as near-zero spikes; clip anything outside the
  # operating band back to limits rather than dropping the row.
  outlier_clip_tolerance: 0.0

model:
  params:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.8
    reg_lambda: 1.5
    min_child_weight: 5
  artifact_path: artifacts/model.json
  metadata_path: artifacts/model_meta.json

optimizer:
  # 17 controllable dims -> give TPE more trials to search effectively.
  n_trials: 400
  seed: 42

# -----------------------------------------------------------------------------
# COLUMN CONTRACT  (keys MUST match the CSV headers exactly)
# Note: '% Iron Concentrate' and 'date' are intentionally NOT declared, so they
# are ignored as features. '% Iron Concentrate' is the co-product of the target
# and would be data leakage; 'date' is used only for the time-based split.
# -----------------------------------------------------------------------------
columns:

  # ---- Fixed operating conditions (incoming ore + upstream pulp) ------------
  "% Iron Feed":
    role: fixed
    unit: "%"
    description: "Iron grade of the incoming ore feed."
    min: 42.0
    max: 66.0

  "% Silica Feed":
    role: fixed
    unit: "%"
    description: "Silica (impurity) grade of the incoming ore feed."
    min: 1.3
    max: 33.5

  "Ore Pulp Flow":
    role: fixed
    unit: "t/h"
    description: "Ore pulp flow set by upstream grinding."
    min: 376.0
    max: 419.0

  "Ore Pulp Density":
    role: fixed
    unit: "kg/cm3"
    description: "Ore pulp density from upstream."
    min: 1.5
    max: 1.86

  # ---- Controllable setpoints (reagents, pH, aeration, froth levels) --------
  "Starch Flow":
    role: controllable
    unit: "m3/h"
    description: "Starch (depressant) reagent dosing flow."
    min: 0.0
    max: 6300.0

  "Amina Flow":
    role: controllable
    unit: "m3/h"
    description: "Amina (collector) reagent dosing flow."
    min: 241.0
    max: 740.0

  "Ore Pulp pH":
    role: controllable
    unit: "pH"
    description: "Pulp pH, adjusted via lime addition."
    min: 8.7
    max: 10.85

  "Flotation Column 01 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 1."
    min: 175.0
    max: 374.0
  "Flotation Column 02 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 2."
    min: 175.0
    max: 376.0
  "Flotation Column 03 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 3."
    min: 176.0
    max: 365.0
  "Flotation Column 04 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 4."
    min: 292.0
    max: 306.0
  "Flotation Column 05 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 5."
    min: 286.0
    max: 311.0
  "Flotation Column 06 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 6."
    min: 189.0
    max: 371.0
  "Flotation Column 07 Air Flow":
    role: controllable
    unit: "Nm3/h"
    description: "Air injection rate, column 7."
    min: 185.0
    max: 372.0

  "Flotation Column 01 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 1."
    min: 149.0
    max: 863.0
  "Flotation Column 02 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 2."
    min: 210.0
    max: 829.0
  "Flotation Column 03 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 3."
    min: 126.0
    max: 887.0
  "Flotation Column 04 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 4."
    min: 162.0
    max: 681.0
  "Flotation Column 05 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 5."
    min: 166.0
    max: 676.0
  "Flotation Column 06 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 6."
    min: 155.0
    max: 699.0
  "Flotation Column 07 Level":
    role: controllable
    unit: "mm"
    description: "Froth level setpoint, column 7."
    min: 175.0
    max: 660.0

  # ---- Target --------------------------------------------------------------
  "% Silica Concentrate":
    role: target
    unit: "%"
    description: "Silica impurity in the final iron concentrate (lower = better quality)."
    min: 0.5
    max: 5.5
    direction: minimize
